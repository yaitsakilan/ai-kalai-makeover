function productExpenseChipToggle(chipEl, category) {
  const itemName = chipEl.textContent.trim();
  chipEl.classList.toggle('selected');
  
  const containerId = category === 'product' ? 'pe-product-amounts' : 'pe-makeup-amounts';
  const amountList = document.getElementById(containerId);
  const otherDivId = category === 'product' ? 'pe-product-other-div' : 'pe-makeup-other-div';
  
  if (itemName === 'Others') {
    const otherInput = document.getElementById(otherDivId);
    if (chipEl.classList.contains('selected')) {
      if (otherInput) otherInput.classList.add('show');
    } else {
      if (otherInput) otherInput.classList.remove('show');
      const prefix = category === 'product' ? 'pe-row-prod-other-' : 'pe-row-make-other-';
      document.querySelectorAll(`[id^="${prefix}"]`).forEach(r => r.remove());
      updateProductExpenseTotal();
    }
    return;
  }

  const sanitizedId = itemName.replace(/\s+/g, '-').toLowerCase();
  const rowId = category === 'product' ? `pe-row-prod-${sanitizedId}` : `pe-row-make-${sanitizedId}`;

  if (chipEl.classList.contains('selected')) {
    if (!document.getElementById(rowId)) {
      const row = document.createElement('div');
      row.className = 'service-amount-row';
      row.id = rowId;
      row.dataset.name = itemName;
      row.dataset.category = category;
      row.innerHTML = `
        <div class="sa-name" style="color:${category === 'product' ? '#6d28d9' : '#be185d'}">
          <i class="ti ${category === 'product' ? 'ti-package' : 'ti-brush'}"></i>${itemName}
        </div>
        <span style="font-size:12px;color:#888">₹</span>
        <input type="number" placeholder="Amount" oninput="updateProductExpenseTotal()">
        <div class="sa-remove" onclick="removeProductExpenseRow('${rowId}', '${itemName}', '${category}')" title="Remove"><i class="ti ti-x" style="font-size:14px"></i></div>`;
      amountList.appendChild(row);
    }
  } else {
    const row = document.getElementById(rowId);
    if (row) row.remove();
  }
  updateProductExpenseTotal();
}

function addOtherProductExpenseAmount(category) {
  const otherNameInputId = category === 'product' ? 'pe-product-other' : 'pe-makeup-other';
  const otherNameInput = document.getElementById(otherNameInputId);
  const otherName = otherNameInput ? otherNameInput.value.trim() : '';
  if (!otherName) { showToast('Please enter the name first', 'error'); return; }
  
  const containerId = category === 'product' ? 'pe-product-amounts' : 'pe-makeup-amounts';
  const amountList = document.getElementById(containerId);
  const rowId = category === 'product' ? `pe-row-prod-other-${Date.now()}` : `pe-row-make-other-${Date.now()}`;
  
  const row = document.createElement('div');
  row.className = 'service-amount-row';
  row.id = rowId;
  row.dataset.name = otherName;
  row.dataset.category = category;
  row.innerHTML = `
    <div class="sa-name" style="color:${category === 'product' ? '#6d28d9' : '#be185d'}">
      <i class="ti ${category === 'product' ? 'ti-package' : 'ti-brush'}"></i>${otherName}
    </div>
    <span style="font-size:12px;color:#888">₹</span>
    <input type="number" placeholder="Amount" oninput="updateProductExpenseTotal()">
    <div class="sa-remove" onclick="removeProductExpenseRow('${rowId}', null, '${category}')" title="Remove"><i class="ti ti-x" style="font-size:14px"></i></div>`;
  
  amountList.appendChild(row);
  otherNameInput.value = '';
  otherNameInput.focus();
  updateProductExpenseTotal();
}

function removeProductExpenseRow(rowId, itemName, category) {
  const row = document.getElementById(rowId);
  if (row) row.remove();
  
  if (itemName) {
    const chipsId = category === 'product' ? 'pe-product-chips' : 'pe-makeup-chips';
    const chips = document.querySelectorAll(`#${chipsId} .chip`);
    chips.forEach(c => {
      if (c.textContent.trim() === itemName) c.classList.remove('selected');
    });
  }
  updateProductExpenseTotal();
}

function updateProductExpenseTotal() {
  const productRows = document.querySelectorAll('#pe-product-amounts .service-amount-row');
  const makeupRows = document.querySelectorAll('#pe-makeup-amounts .service-amount-row');
  
  let total = 0;
  productRows.forEach(r => { total += parseInt(r.querySelector('input')?.value) || 0; });
  makeupRows.forEach(r => { total += parseInt(r.querySelector('input')?.value) || 0; });
  
  const el = document.getElementById('pe-total-amount');
  if (el) el.textContent = '₹' + total.toLocaleString();
  
  const bar = document.getElementById('pe-total-bar');
  if (bar) bar.style.display = (productRows.length > 0 || makeupRows.length > 0) ? 'flex' : 'none';
}

function getProductExpenseItems() {
  const productRows = document.querySelectorAll('#pe-product-amounts .service-amount-row');
  const makeupRows = document.querySelectorAll('#pe-makeup-amounts .service-amount-row');
  
  const products = [];
  productRows.forEach(r => {
    const name = r.dataset.name;
    const amount = parseInt(r.querySelector('input')?.value) || 0;
    if (name) products.push({ name, amount, type: 'product' });
  });
  
  const makeup = [];
  makeupRows.forEach(r => {
    const name = r.dataset.name;
    const amount = parseInt(r.querySelector('input')?.value) || 0;
    if (name) makeup.push({ name, amount, type: 'makeup' });
  });
  
  return { products, makeup };
}

async function submitProductExpenseForm() {
  const date = document.getElementById('pe-date').value || new Date().toISOString().split('T')[0];
  const { products, makeup } = getProductExpenseItems();
  
  if (products.length === 0 && makeup.length === 0) {
    showToast('Please select at least one item and enter its amount', 'error');
    return;
  }
  
  const hasZeroProd = products.some(p => p.amount <= 0);
  const hasZeroMake = makeup.some(m => m.amount <= 0);
  if (hasZeroProd || hasZeroMake) {
    showToast('Please enter amount for all selected items', 'error');
    return;
  }
  
  const totalAmount = [...products, ...makeup].reduce((s, x) => s + x.amount, 0);
  
  let noteParts = [];
  if (products.length > 0) {
    const pStr = products.map(p => `${p.name} (₹${p.amount.toLocaleString()})`).join(', ');
    noteParts.push(`Products: ${pStr}`);
  }
  if (makeup.length > 0) {
    const mStr = makeup.map(m => `${m.name} (₹${m.amount.toLocaleString()})`).join(', ');
    noteParts.push(`Makeup: ${mStr}`);
  }
  const note = noteParts.join(' | ');
  
  const btn = document.getElementById('pe-submit-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<div class="dot-anim"><span></span><span></span><span></span></div> Saving...';
  }
  
  const result = await addExpense({
    category: 'Products',
    amount: totalAmount,
    date,
    note
  });
  
  if (result) {
    closeFormOverlay();
    chatMessages.push({
      role: 'ai',
      text: `✅ Saved Product Expense of <strong>₹${totalAmount.toLocaleString()}</strong> to Database! 🎉<br><span style="font-size:11px;color:#888">${note}</span>`
    });
    render();
    scrollChatBottom();
  } else {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-check"></i> Save Expense';
    }
  }
}

// ——— Instagram Reels Ideas ———
async function renderReels() {
  const ideas = await fetchReelsIdeas();
  window._cachedReelsIdeas = ideas;
  
  const totalIdeas = ideas.length;
  const plannedCount = ideas.filter(i => i.status === 'Planned').length;
  const draftedCount = ideas.filter(i => i.status === 'Drafted').length;
  const postedCount = ideas.filter(i => i.status === 'Posted').length;

  return `
  <div class="top-bar">
    <div>
      <h2>Instagram Reels Ideas</h2>
      <p style="font-size:12px;color:#999">Save and manage content creation ideas for your salon's social media</p>
    </div>
    <button class="btn btn-gold" onclick="showAddReelsIdeaModal()">
      <i class="ti ti-plus"></i> Add Reels Idea
    </button>
  </div>
  
  <div class="metric-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="metric-card mc-gold">
      <div class="metric-label">Total Ideas</div>
      <div class="metric-value">${totalIdeas}</div>
      <div class="metric-sub">Brainstormed concepts</div>
      <i class="ti ti-brand-instagram metric-icon"></i>
    </div>
    <div class="metric-card mc-rose">
      <div class="metric-label">Planned</div>
      <div class="metric-value">${plannedCount}</div>
      <div class="metric-sub">To be scripted</div>
      <i class="ti ti-clock metric-icon"></i>
    </div>
    <div class="metric-card mc-purple">
      <div class="metric-label">Drafted</div>
      <div class="metric-value">${draftedCount}</div>
      <div class="metric-sub">Recorded & editing</div>
      <i class="ti ti-video metric-icon"></i>
    </div>
    <div class="metric-card mc-teal">
      <div class="metric-label">Posted</div>
      <div class="metric-value">${postedCount}</div>
      <div class="metric-sub">Shared on Instagram</div>
      <i class="ti ti-circle-check metric-icon"></i>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;gap:10px">
      <input class="form-input" style="flex:1" placeholder="Search ideas..." id="reels-search" oninput="filterReelsIdeas(this.value)">
      <select class="form-input form-select" style="width:160px" onchange="filterReelsByStatus(this.value)">
        <option value="all">All Statuses</option>
        <option value="Planned">Planned</option>
        <option value="Drafted">Drafted</option>
        <option value="Posted">Posted</option>
      </select>
    </div>
  </div>

  <div id="reels-list-container">
    ${renderReelsList(ideas)}
  </div>`;
}

function renderReelsList(ideas) {
  if(!ideas.length) {
    return `<div class="card" style="text-align:center;padding:40px;color:#999">
      <i class="ti ti-brand-instagram" style="font-size:32px;display:block;margin-bottom:10px;opacity:0.3"></i>
      No Reels ideas found. Start by adding one or talking to the chatbot!
    </div>`;
  }
  
  return ideas.map(i => {
    let badgeClass = 'badge-amber';
    if(i.status === 'Drafted') badgeClass = 'badge-blue';
    else if(i.status === 'Posted') badgeClass = 'badge-green';
    
    const dateStr = i.created_at ? new Date(i.created_at).toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'}) : 'Recently';

    return `
      <div class="card" style="margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:500; color:#1a1a1a; line-height:1.4; white-space:pre-wrap;">${i.idea}</div>
          <div style="font-size:11px; color:#bbb; margin-top:6px;">Added on ${dateStr}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex-shrink:0;">
          <span class="badge ${badgeClass}" style="cursor:pointer; user-select:none; transition: transform 0.1s;" onclick="cycleReelsIdeaStatus('${i.id}', '${i.status}')" title="Click to cycle status">
            ${i.status}
          </span>
          <button onclick="handleDeleteReelsIdea('${i.id}')" class="btn btn-outline btn-icon" style="width:34px; height:34px; padding:0; border-radius:8px; border:none; background:transparent; display:flex; align-items:center; justify-content:center; color:#ccc;" onmouseover="this.style.color='#dc2626';this.style.background='#fee2e2'" onmouseout="this.style.color='#ccc';this.style.background='transparent'">
            <i class="ti ti-trash" style="font-size:16px"></i>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

async function cycleReelsIdeaStatus(id, currentStatus) {
  const statuses = ['Planned', 'Drafted', 'Posted'];
  const currentIndex = statuses.indexOf(currentStatus);
  const nextStatus = statuses[(currentIndex + 1) % statuses.length];
  
  const updated = await updateReelsIdea(id, { status: nextStatus });
  if (updated) {
    showToast(`Status updated to ${nextStatus}`);
    render();
  }
}

async function handleDeleteReelsIdea(id) {
  if(!confirm('Delete this reels idea?')) return;
  const success = await deleteReelsIdea(id);
  if(success) {
    render();
  }
}

function filterReelsIdeas(q) {
  const ideas = (window._cachedReelsIdeas || []).filter(i =>
    (i.idea || '').toLowerCase().includes(q.toLowerCase())
  );
  const el = document.getElementById('reels-list-container');
  if(el) el.innerHTML = renderReelsList(ideas);
}

function filterReelsByStatus(status) {
  let ideas = window._cachedReelsIdeas || [];
  if(status !== 'all') {
    ideas = ideas.filter(i => i.status === status);
  }
  const el = document.getElementById('reels-list-container');
  if(el) el.innerHTML = renderReelsList(ideas);
}

function showAddReelsIdeaModal() {
  showModal('Add New Reels Idea', `
    <div id="form-voice-container"></div>
    <div class="form-group" style="position:relative">
      <label class="form-label" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px;">
        <span>Idea Description *</span>
        <button class="btn btn-outline btn-icon" id="form-mic-btn" onclick="startVoiceRecording('reels_idea')" title="Fill with voice" style="width:28px; height:28px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center; border-color:#e5e5e5; transition: all 0.2s ease;">
          <i class="ti ti-microphone" style="font-size:13px; color:#d97706;"></i>
        </button>
      </label>
      <textarea class="form-input" id="m-reels-text" placeholder="e.g. Before-after transition video showing bridal makeup on Anita" rows="4" style="resize:vertical;"></textarea>
    </div>
  `, async () => {
    const ideaText = document.getElementById('m-reels-text').value.trim();
    if(!ideaText) { showToast('Please enter the idea details','error'); return; }
    
    const result = await addReelsIdea(ideaText);
    closeModal();
    if (result) {
      render();
    }
  });
}

// ——— Init ———
if (localStorage.getItem('sidebar-collapsed') === 'true') {
  document.getElementById('app').classList.add('sidebar-collapsed');
  const icon = document.getElementById('sidebar-toggle-icon');
  if (icon) icon.className = 'ti ti-chevron-right';
}
render();
</script>
