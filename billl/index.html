<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalai Makeover — AI Business Assistant</title>
  <meta name="description" content="AI-powered business assistant for Kalai Makeover beauty salon — manage customers, events, expenses and more.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>✨ Kalai Makeover</h1>
      <p>AI Business Assistant</p>
    </div>
    <div style="flex:1;overflow-y:auto;padding:8px 0" class="scrollbar-hide">
      <div class="nav-section">Main</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <i class="ti ti-layout-dashboard"></i> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('ai-chat')" id="nav-ai-chat">
        <i class="ti ti-message-circle"></i> AI Entry
      </div>
      <div class="nav-section">Management</div>
      <div class="nav-item" onclick="showPage('customers')" id="nav-customers">
        <i class="ti ti-users"></i> Customers
      </div>
      <div class="nav-item" onclick="showPage('events')" id="nav-events">
        <i class="ti ti-calendar-event"></i> Events
      </div>
      <div class="nav-item" onclick="showPage('expenses')" id="nav-expenses">
        <i class="ti ti-receipt"></i> Expenses
      </div>
      <div class="nav-item" onclick="showPage('students')" id="nav-students">
        <i class="ti ti-school"></i> Students
      </div>
      <div class="nav-item" onclick="showPage('jewels')" id="nav-jewels">
        <i class="ti ti-diamond"></i> Jewels
      </div>

      <!-- Forms Sub-Section -->
      <div style="padding: 10px 18px 2px; font-size: 10px; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;">Forms</div>
      <div class="nav-item" onclick="window.openShopCustomerForm()" id="nav-shop-customer-form" style="padding-left: 24px; font-size: 12px; opacity: 0.85;">
        <i class="ti ti-scissors" style="font-size: 14px; width: 16px;"></i> Shop Customer
      </div>
      <div class="nav-item" onclick="window.openClassesForm()" id="nav-classes-form" style="padding-left: 24px; font-size: 12px; opacity: 0.85;">
        <i class="ti ti-school" style="font-size: 14px; width: 16px;"></i> Class Enrollment
      </div>
      <div class="nav-item" onclick="window.openEventCustomerForm()" id="nav-event-form" style="padding-left: 24px; font-size: 12px; opacity: 0.85;">
        <i class="ti ti-calendar-heart" style="font-size: 14px; width: 16px;"></i> Event Booking
      </div>
      <div class="nav-item" onclick="window.openProductExpenseForm()" id="nav-product-expense-form" style="padding-left: 24px; font-size: 12px; opacity: 0.85;">
        <i class="ti ti-package" style="font-size: 14px; width: 16px;"></i> Product Expense
      </div>
      <div class="nav-item" onclick="window.openBulkExpenseForm()" id="nav-bulk-expense-form" style="padding-left: 24px; font-size: 12px; opacity: 0.85;">
        <i class="ti ti-receipt-2" style="font-size: 14px; width: 16px;"></i> Bulk Expense
      </div>

      <div class="nav-section">Insights</div>
      <div class="nav-item" onclick="showPage('analytics')" id="nav-analytics">
        <i class="ti ti-chart-bar"></i> Analytics
      </div>
      <div class="nav-item" onclick="showPage('ocr')" id="nav-ocr">
        <i class="ti ti-scan"></i> Bill Scanner
      </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid rgba(255,200,100,0.1);display:flex;flex-direction:column;gap:8px">
      <div style="font-size:11px;color:rgba(255,255,255,0.35)" id="sidebar-role-label">Parlour Owner</div>
      <div style="font-size:13px;color:rgba(245,200,66,0.8);font-weight:500" id="sidebar-user-name">Kalai</div>
      <button onclick="window.openSwitchRoleModal()" id="sidebar-switch-role-btn" style="margin-top:2px;background:rgba(255,200,66,0.08);border:0.5px solid rgba(245,200,66,0.2);border-radius:8px;color:rgba(255,255,255,0.45);font-size:11px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all 0.2s">
        <i class="ti ti-switch-horizontal" style="font-size:13px"></i> Switch Role
      </button>
    </div>

    <button class="sidebar-toggle-tab" onclick="toggleSidebar()" title="Toggle Sidebar" id="sidebar-toggle-btn">
      <i class="ti ti-chevron-left" id="sidebar-toggle-icon"></i>
    </button>
  </div>

  <div class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileSidebar()">
    <i class="ti ti-menu-2"></i>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

  <div class="main">
    <div id="main-content">
      <!-- Pages rendered here by JS -->
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div id="modal-container"></div>
<div id="form-overlay-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="config.js"></script>
<script>
window.onerror = function(message, source, lineno, colno, error) {
  const errDiv = document.createElement('div');
  errDiv.style = 'background:#dc2626;color:white;position:fixed;top:0;left:0;right:0;z-index:99999;padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;box-shadow:0 4px 6px rgba(0,0,0,0.1)';
  errDiv.innerHTML = '🔴 JS Error: ' + message + '\nFile: ' + source + '\nLine: ' + lineno + ' Col: ' + colno + (error ? '\nStack:\n' + error.stack : '');
  document.body.appendChild(errDiv);
};
window.addEventListener('unhandledrejection', function(event) {
  const errDiv = document.createElement('div');
  errDiv.style = 'background:#ea580c;color:white;position:fixed;top:0;left:0;right:0;z-index:99999;padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;box-shadow:0 4px 6px rgba(0,0,0,0.1)';
  errDiv.innerHTML = '🟠 Promise Rejection: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown reason') + (event.reason && event.reason.stack ? '\nStack:\n' + event.reason.stack : '');
  document.body.appendChild(errDiv);
});
</script>
<script type="module" src="js/app.js"></script>

</body>
</html>
